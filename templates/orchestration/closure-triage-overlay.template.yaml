# Closure triage overlay template.
# Copy into a target repo only when that repo needs durable project-specific closure rules.

project:
  name: "<project-name>"
  source_of_truth:
    - "AGENTS.md"
    - "docs/ProjectSpec.md"
    - "docs/plans/"

closure:
  accepted_baseline: "<commit-or-artifact>"
  evidence_root: ".work/review/"
  status_docs:
    - "docs/status.md"

candidate_packet:
  objective: "<smallest-safe-next-step>"
  in_scope:
    - "<item>"
  out_of_scope:
    - "<item>"
  required_verification:
    - "<command>"
  # Review primitives are read-only review entry points; use code-review-deep for high-risk code or mixed diffs.
  review_primitives:
    - "<code-review | docs-review | code-review-deep | none>"
  # Code/docs formal gates are evidence-and-decision adapters around review primitives.
  code_docs_formal_gate: "<code-review-gate | docs-review-gate | none>"
  # Merge readiness gates evaluate branch readiness and may be shared or repo-specific.
  merge_readiness_gate: "<merge-readiness-gate | repo-specific readiness gate | none>"
  formal_gate_trigger: "<commit readiness | PR readiness | merge readiness | explicit repo-policy blocking decision | none>"
  human_gate:
    required: false
    reason: "<reason-if-required>"
