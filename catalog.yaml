# codex-dev-skills catalog
# Codex-only public catalog. Paths are repository-relative source paths.

name: codex-dev-skills
version: "0.6.0"
platforms:
  - codex
  - codex-desktop

groups:
  shared-review-gates:
    description: Shared review gates, closure triage, safety policies, and reusable orchestration templates.
    runtime: shared
    depends_on: []
    skills:
      - source: skills/closure-triage
      - source: skills/task-continuation
      - source: skills/code-review-gate
      - source: skills/docs-review-gate
      - source: skills/merge-readiness-gate
      - source: skills/review-artifact-cleanup
    templates:
      - source: policies/agent-delegation-policy.md
      - source: policies/delivery-drift-control-policy.md
      - source: policies/human-gate-policy.md
      - source: policies/model-selection-policy.md
      - source: policies/multi-agent-integration-policy.md
      - source: policies/project-agent-knowledge-policy.md
      - source: policies/projectspec-alignment-policy.md
      - source: policies/reusable-workflow-contract.md
      - source: policies/review-artifact-policy.md
      - source: policies/runtime-compatibility-policy.md
      - source: policies/security-review-escalation-policy.md
      - source: templates/orchestration/agent-task-brief.template.md
      - source: templates/orchestration/agent-routing-integration.template.yaml
      - source: templates/orchestration/closure-triage-overlay.template.yaml
      - source: templates/orchestration/current-task-summary.template.md
      - source: templates/orchestration/implementation-plan.template.md
      - source: templates/orchestration/integration-review-report.template.md
      - source: templates/orchestration/next-session-prompt.template.md
      - source: templates/orchestration/orchestrator-gate-report.template.md
      - source: templates/orchestration/project-spec.template.md
      - source: templates/orchestration/task-continuation-report.template.md
      - source: templates/orchestration/task-manifest.template.yaml

  codex-review-workflow:
    description: Routine and deep code, docs, and merge review workflows for Codex.
    runtime: shared
    depends_on: [shared-review-gates]
    skills:
      - source: skills/code-review
      - source: skills/code-review-deep
      - source: skills/docs-review
      - source: skills/merge-review
      - source: skills/merge-review-deep
    templates:
      - source: templates/review/code-review-report.template.md
      - source: templates/review/merge-review-report.template.md
      - source: templates/review/review-follow-up.template.md
      - source: workflows/review-workflow.md
      - source: workflows/merge-readiness-workflow.md

  codex-delivery-workflow:
    description: Loop engineering, planning, bounded implementation, documentation update, and delegated delivery workflows.
    runtime: shared
    depends_on: [shared-review-gates]
    skills:
      - source: skills/loop-engineering
      - source: skills/planning
      - source: skills/milestone-continuation
      - source: skills/project-delivery
      - source: skills/project-orchestrator
      - source: skills/implementation-slice
      - source: skills/docs-update
    templates:
      - source: docs/native-runtime-capabilities.md
      - source: templates/orchestration/loop-engineering-spec.template.md
      - source: templates/orchestration/loop-decision-input.template.yaml
      - source: templates/orchestration/loop-event.template.yaml
      - source: templates/orchestration/loop-handoff-prompt.template.md
      - source: templates/orchestration/loop-iteration-report.template.md
      - source: templates/orchestration/loop-state-ledger.template.yaml
      - source: templates/orchestration/task-claim-lease.template.yaml
      - source: workflows/implementation-workflow.md
      - source: workflows/loop-engineering-workflow.md

  desktop-delivery-workflow:
    description: Thin Codex Desktop task, thread, worktree, scheduling, and integration adapters over shared delivery workflows.
    runtime: desktop
    depends_on: [shared-review-gates, codex-delivery-workflow]
    skills:
      - source: skills/desktop-project-delivery
      - source: skills/desktop-thread-delegation
      - source: skills/desktop-spec-plan-gate
      - source: skills/desktop-implementation-gate
      - source: skills/desktop-pr-merge-gate
    templates:
      - source: workflows/desktop-delivery-workflow.md

  codex-agent-profiles:
    description: Opt-in Loop Engineering V2a custom-agent runtime profiles.
    runtime: shared
    depends_on: [codex-delivery-workflow]
    agent_profiles:
      - source: agent-profiles/loop_v2a_fast_explorer.toml
      - source: agent-profiles/loop_v2a_balanced_worker.toml
      - source: agent-profiles/loop_v2a_deep_reviewer.toml
      - source: agent-profiles/loop_v2a_security_reviewer.toml
